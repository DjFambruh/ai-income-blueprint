<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Income Blueprint</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#312e81);
overflow:hidden;
}

.login-box{
width:350px;
padding:30px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
border-radius:20px;
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 0 30px rgba(0,0,0,0.4);
}

h1{
color:white;
text-align:center;
margin-bottom:10px;
}

p{
color:#cbd5e1;
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border:none;
outline:none;
border-radius:10px;
background:rgba(255,255,255,0.1);
color:white;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#4f46e5;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
transition:.3s;
}

button:hover{
transform:scale(1.03);
}

.register{
text-align:center;
margin-top:15px;
color:white;
}

.register a{
color:#60a5fa;
text-decoration:none;
}
</style>
</head>

<body>

<div class="login-box">
<h1>AI Income Blueprint</h1>
<p>Premium Learning Platform</p>

<input type="email" id="email" placeholder="Email Address">

<input type="password" id="password" placeholder="Password">

<button id="loginBtn">Login</button>



<div class="register">
Don't have an account?
<a href="#">Register</a>
</div>
</div>
<script>
document.getElementById("loginBtn").addEventListener("click", () => {
    alert("Login Button Working");
});
</script>
</body>
</html>
