
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#020617,#0f172a,#0a0f2c);
color:white;
text-align:center;
padding:20px;
}

.payment-box{
max-width:500px;
margin:auto;
padding:30px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.1);
border-radius:25px;
backdrop-filter:blur(15px);
}

h1{
font-size:32px;
margin-bottom:10px;
}

.price{
font-size:42px;
font-weight:bold;
color:#00d4ff;
margin-bottom:20px;
}

.qr{
width:280px;
max-width:100%;
background:white;
padding:15px;
border-radius:20px;
margin:20px auto;
display:block;
}

.upi{
background:rgba(255,255,255,.08);
padding:15px;
border-radius:15px;
font-size:18px;
font-weight:bold;
margin:20px 0;
}

.steps{
text-align:left;
line-height:1.8;
}

.telegram-btn{
display:inline-block;
margin-top:25px;
padding:15px 30px;
background:linear-gradient(90deg,#00c6ff,#0072ff);
color:white;
text-decoration:none;
border-radius:15px;
font-weight:bold;
}

.note{
margin-top:20px;
color:#9ca3af;
}
</style>

</head>

<body>

<div class="payment-box">

<h1>Complete Your Payment</h1>

<div class="price">₹199</div>

<img src="images/qr.jpg" class="qr">

<div class="upi">
gajenderrathod@ptyes
</div>

<div class="steps">
<b>Steps:</b><br>
1. Scan QR Code and pay.<br>
2. Take payment screenshot.<br>
3. Send screenshot on Telegram.<br>
4. Bundle access will be provided after verification.
</div>

<a href="https://t.me/Ofclucky" class="telegram-btn">
Send Screenshot
</a>

<div class="note">
Instant support available on Telegram
</div>

</div>

</body>
</html>
